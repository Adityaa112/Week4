name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# This ensures every "run" command starts inside your project folder
defaults:
  run:
    working-directory: jest-app 

jobs:
  # ── Step 1: Test + Coverage Gate ──────────────────────────────
  test:
    name: Test & Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Tells the cache where to find the lock file
          cache-dependency-path: 'jest-app/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --forceExit

      - name: Check coverage is ≥ 80%
        run: |
          FOUND=$(grep -h "^LF:" coverage/lcov.info | awk -F: '{s+=$2} END{print s}')
          HIT=$(grep -h "^LH:" coverage/lcov.info | awk -F: '{s+=$2} END{print s}')
          PCT=$(( HIT * 100 / FOUND ))
          echo "Coverage: $PCT%"
          [ "$PCT" -ge 80 ] || { echo " Coverage $PCT% < 80%. Failing."; exit 1; }

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: jest-app/coverage/ # Path relative to the root

  # ── Step 2: SonarQube Analysis ────────────────────────────────
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: jest-app/coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          # projectBaseDir tells Sonar where the code is
          projectBaseDir: jest-app
          args: >
            -Dsonar.projectKey=jest-sonarqube
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.inclusions=src/**/*.ts,src/**/*.tsx,src/**/*.js,src/**/*.jsx
            -Dsonar.exclusions=src/**/*.test.ts,src/**/*.test.tsx,src/setupTests.ts,node_modules/**,dist/**
            -Dsonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.test.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  # ── Step 3: Deploy (only on push to main/master) ──────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: sonar
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'jest-app/package-lock.json'

      - run: npm ci
      - run: npm run build
      - run: echo "Deploying application..."
